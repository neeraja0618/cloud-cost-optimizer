<!DOCTYPE html>
<html>
<head>
    <title>Cloud Cost Optimizer</title>

    <style>
        body {
            font-family: Arial;
            background-color: #f5f5f5;
            margin: 0;
            padding: 0;
        }

        .header {
            background-color: #2c3e50;
            color: white;
            padding: 15px;
            text-align: center;
        }

        .container {
            padding: 20px;
        }

        .card {
            background: white;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .alert {
            color: red;
            font-weight: bold;
        }

        .success {
            color: green;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="header">
        <h1>Cloud Cost Optimizer Dashboard</h1>
    </div>

    <div class="container">

        <div class="card">
            <h2>CPU Usage</h2>
            <p>20% → 15% → 5% → 2%</p>
        </div>

        <div class="card">
            <h2>Status</h2>
            <p class="alert">⚠️ Idle instance detected (CPU below threshold)</p>
        </div>

        <div class="card">
            <h2>Action Taken</h2>
            <p class="success">✅ EC2 instance stopped automatically</p>
        </div>

        <div class="card">
            <h2>Money Saved</h2>
            <p>₹120 saved</p>
        </div>

    </div>

</body>
</html>
